<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | KubeScale</title>
    <link rel="icon" type="image/svg+xml" href="assets/images/favicon.svg">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: { primary: { indigo: '#4f46e5', purple: '#9333ea', cyan: '#06b6d4' } },
                    fontFamily: { sans: ['Outfit', 'sans-serif'] },
                }
            }
        }
    </script>
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gradient-mesh transition-colors duration-300">

    
    <div class="auth-wrapper flex flex-col items-center justify-center min-h-screen py-20 px-4">
        <!-- Toggles Container -->
        <div class="w-full max-w-md lg:max-w-none lg:w-auto flex justify-end gap-3 mb-6 lg:mb-0 lg:fixed lg:top-8 lg:right-8 relative z-50" data-aos="fade-down" data-aos-delay="100">
            <button id="rtl-toggle" class="h-10 px-4 glass-card rounded-xl border border-white/10 flex items-center justify-center hover:bg-indigo-500/20 transition-all text-xs font-bold dark:text-white shadow-lg backdrop-blur-md">RTL</button>
            <button id="theme-toggle" class="w-10 h-10 glass-card rounded-xl border border-white/10 flex items-center justify-center hover:bg-indigo-500/20 transition-all text-lg shadow-lg backdrop-blur-md"><span id="theme-icon">☀️</span></button>
        </div>
        <div class="glass-card p-10 md:p-12 rounded-[2.5rem] border border-white/10 w-full max-w-md shadow-2xl relative overflow-hidden" data-aos="zoom-in">
            <div class="absolute -top-10 -right-10 w-40 h-40 bg-indigo-600/10 blur-3xl"></div>
            <div class="absolute -bottom-10 -left-10 w-40 h-40 bg-purple-600/10 blur-3xl"></div>

            <!-- Logo + Brand -->
            <a href="index.html" class="flex items-center justify-center gap-3 mb-10 relative z-10 hover:opacity-80 transition-opacity group">
                <div class="w-10 h-10 bg-indigo-600 rounded-xl flex items-center justify-center text-white shadow-lg shadow-indigo-600/20 shrink-0 group-hover:scale-110 transition-transform">
                    <i class="fas fa-cubes-stacked text-xl"></i>
                </div>
                <span class="text-2xl font-bold tracking-tight text-slate-900 dark:text-white">KubeScale</span>
            </a>

            <!-- Welcome Heading -->
            <div class="text-center mb-10 relative z-10">
                <h1 class="text-3xl font-bold mb-3 text-slate-900 dark:text-white">Welcome Back</h1>
                <p class="text-slate-500 dark:text-slate-400 text-sm font-medium">Please enter your details to sign in.</p>
            </div>

            <form action="dashboard.html" class="space-y-6 relative z-10">
                <!-- Email Input -->
                <div class="space-y-2">
                    <label class="text-[10px] font-bold uppercase text-slate-500 ml-4 tracking-widest">Email Address</label>
                    <input type="email" placeholder="admin@kubescale.io" class="w-full bg-slate-50 dark:bg-white/5 border border-slate-200 dark:border-white/10 rounded-2xl px-6 py-4 outline-none focus:border-indigo-500 transition-all shadow-sm font-medium" required>
                </div>

                <!-- Password Input -->
                <div class="space-y-2">
                    <label class="text-[10px] font-bold uppercase text-slate-500 ml-4 tracking-widest">Password</label>
                    <div class="password-container">
                        <input type="password" id="login-password" placeholder="••••••••" class="w-full bg-slate-50 dark:bg-white/5 border border-slate-200 dark:border-white/10 rounded-2xl px-6 py-4 pr-14 outline-none focus:border-indigo-500 transition-all shadow-sm font-medium" required>
                        <div class="password-toggle" onclick="togglePassword('login-password', this)">
                            <i class="fas fa-eye"></i>
                        </div>
                    </div>
                </div>

                <!-- Remember Me + Forgot Password -->
                <div class="flex items-center justify-between px-1 sm:px-2 pt-1 gap-2">
                    <label class="flex items-center gap-2 cursor-pointer group shrink-0">
                        <input type="checkbox" class="w-4 h-4 rounded border-slate-300 dark:border-white/10 text-indigo-600 focus:ring-indigo-500 transition-all cursor-pointer">
                        <span class="text-[10px] sm:text-[11px] font-bold uppercase text-slate-500 group-hover:text-slate-700 dark:group-hover:text-slate-300 tracking-wider transition-colors whitespace-nowrap">Remember Me</span>
                    </label>
                    <a href="#" class="text-[10px] sm:text-[11px] font-bold text-indigo-600 uppercase tracking-wider hover:text-indigo-700 transition-colors whitespace-nowrap">Forgot Password?</a>
                </div>

                <!-- Login Button -->
                <button type="submit" class="w-full bg-indigo-600 text-white font-bold py-4 rounded-2xl shadow-xl shadow-indigo-600/30 hover:scale-[1.02] active:scale-[0.98] transition-all mt-4">Login</button>
            </form>

            <!-- Social Login Section -->
            <div class="mt-10 relative z-10">
                <div class="relative flex items-center justify-center mb-8">
                    <div class="absolute inset-0 flex items-center"><div class="w-full border-t border-slate-200 dark:border-white/10"></div></div>
                    <span class="relative px-4 text-[10px] font-bold uppercase text-slate-500 bg-white dark:bg-slate-900 dark:bg-opacity-0 backdrop-blur-xl">Or continue with</span>
                </div>
                <div class="flex justify-center gap-4">
                    <a href="#" class="social-btn" title="Google"><i class="fab fa-google"></i></a>
                    <a href="#" class="social-btn" title="Facebook"><i class="fab fa-facebook-f"></i></a>
                    <a href="#" class="social-btn" title="Apple"><i class="fab fa-apple"></i></a>
                </div>
            </div>

            <!-- Signup Redirect Text -->
            <div class="mt-10 text-center relative z-10">
                <p class="text-xs sm:text-sm text-slate-500 font-medium">
                    Don't have an account? <a href="signup.html" class="text-indigo-600 font-bold hover:underline whitespace-nowrap">Sign up for free</a>
                </p>
            </div>
        </div>
    </div>


    <!-- SECTION 4: Footer -->

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>AOS.init();</script>
    <!-- Back to Top Arrow -->
    <button id="back-to-top" class="w-12 h-12 bg-indigo-600 text-white rounded-full shadow-2xl flex items-center justify-center hover:scale-110 transition-all shadow-indigo-600/30">
        <i class="fas fa-arrow-up"></i>
    </button>

    <script src="assets/js/main.js"></script>
    <script>
        function togglePassword(inputId, iconElement) {
            const input = document.getElementById(inputId);
            const icon = iconElement.querySelector('i');
            if (input.type === 'password') {
                input.type = 'text';
                icon.classList.remove('fa-eye');
                icon.classList.add('fa-eye-slash');
            } else {
                input.type = 'password';
                icon.classList.remove('fa-eye-slash');
                icon.classList.add('fa-eye');
            }
        }
    </script>
</body>
</html>
